<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pastry | Arkaco Coffee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f0e6;
            margin: 0;
            padding: 0;
            color: #0b3a2a;
        }

        header {
            background-color: #0b3a2a;
            color: white;
            padding: 25px 0;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        a.back {
            display: block;
            text-align: center;
            margin: 10px 0;
            color: white;
            font-size: 18px;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin: 25px 0 20px;
            text-decoration: underline;
        }

        /* 🥐 GALERI PASTRY */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #0b3a2a;
        }

        .item.full-width {
            grid-column: span 2;
            display: flex;
            justify-content: center;
        }

        .item.full-width img {
            max-width: 350px;
        }

        /* 📋 LIST MENU */
        .menu {
            max-width: 900px;
            margin: 10px auto 40px;
            padding: 0 20px;
        }

        .menu h3 {
            text-align: center;
            margin: 20px 0 15px;
            font-size: 22px;
        }

        .menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #0b3a2a;
            font-size: 16px;
        }

        .price {
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    Pastry
</header>

<a href="home.html" class="back">← Kembali</a>

<h2>Menu Pastry</h2>

<!-- GALERI FOTO PASTRY -->
<div class="gallery">
    <div class="item">
        <img src="images/Croissant.jpeg" alt="Croissant">
    </div>

    <div class="item">
        <img src="images/Danish.jpeg" alt="Danish">
    </div>

    <div class="item">
        <img src="images/Burnt Cheesecake.jpeg" alt="Burnt Cheesecake">
    </div>

    <div class="item">
        <img src="images/Cinnamon Roll Matcha.jpeg" alt="Cinnamon Roll Matcha">
    </div>

    <div class="item full-width">
        <img src="images/Fudgy Brownies.jpeg" alt="Fudgy Brownies">
    </div>
</div>

<!-- DAFTAR HARGA -->
<div class="menu">
    <h3>Pastry List</h3>
    <ul>
        <li><span>Croissant</span><span class="price">12K</span></li>
        <li><span>Danish</span><span class="price">13K</span></li>
        <li><span>Burnt Cheesecake</span><span class="price">25K</span></li>
        <li><span>Cinnamon Roll Matcha</span><span class="price">25K</span></li>
        <li><span>Fudgy Brownies (2 pcs)</span><span class="price">20K</span></li>
    </ul>
</div>

</body>
</html>
