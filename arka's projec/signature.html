<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signature Coffee | arkaco.coffee</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f0e6;
            margin: 0;
            padding: 0;
            color: #0b3a2a;
        }

        header {
            background-color: #0b3a2a;
            color: white;
            padding: 25px 0;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
        }

        a.back {
            display: block;
            text-align: center;
            margin-top: 10px;
            color: white;
            font-size: 18px;
            text-decoration: none;
        }

        h2 {
            text-align: center;
            margin-top: 25px;
            margin-bottom: 20px;
            color: #0b3a2a;
            text-decoration: underline;
        }

        /* 🟩 GALERI FOTO */
        .gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 900px;
            margin: auto;
        }

        .item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid #0b3a2a;
        }

        .item.full-width {
            grid-column: span 2;
            display: flex;
            justify-content: center;
        }

        .item.full-width img {
            max-width: 350px;
        }

        /* 🟫 MENU SIGNATURE (NYAMBUNG DENGAN FOTO) */
        .menu-signature {
            max-width: 900px;
            margin: 10px auto 40px;
            padding: 0 20px;
        }

        .menu-signature h3 {
            text-align: center;
            margin: 25px 0 15px;
            font-size: 22px;
            color: #0b3a2a;
        }

        .menu-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu-list li {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px dashed #0b3a2a;
            font-size: 16px;
        }

        .menu-list span.price {
            font-weight: bold;
        }
    </style>
</head>

<body>

<header>
    Signature Coffee
</header>

<a href="home.html" class="back">← Kembali</a>

<h2>Menu Signature</h2>

<!-- GALERI FOTO -->
<div class="gallery">
    <div class="item">
        <img src="images/signature1.jpg" alt="Signature 1">
    </div>

    <div class="item">
        <img src="images/signature2.jpg" alt="Signature 2">
    </div>

    <div class="item full-width">
        <img src="images/signature3.jpg" alt="Signature 3">
    </div>
</div>

<!-- DAFTAR MENU (NYAMBUNG, BUKAN TERPISAH) -->
<div class="menu-signature">
    <h3>Signature Drink</h3>
    <ul class="menu-list">
        <li><span>Arka Brown Coffee ⭐</span><span class="price">24K</span></li>
        <li><span>Ice Black Lemon ⭐</span><span class="price">24K</span></li>
        <li><span>Ice Black Peach</span><span class="price">26K</span></li>
        <li><span>Ice Black Raspberry</span><span class="price">25K</span></li>
        <li><span>Fallin Praline ⭐</span><span class="price">26K</span></li>
        <li><span>Dalgona Crumble</span><span class="price">26K</span></li>
        <li><span>Icarus Ostmanthus ⭐</span><span class="price">26K</span></li>
        <li><span>Lemonberry Bliss</span><span class="price">26K</span></li>
    </ul>
</div>

</body>
</html>
