<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Menu Utama - Arkaco Coffee</title>

<style>

body{
font-family:'Poppins',sans-serif;
margin:0;
padding:0;
color:#fff;
text-align:center;

/* Background khusus HP */
background-image:url("images/background.png");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
}

/* overlay supaya tulisan jelas */
.overlay{
min-height:100vh;
background:rgba(0,0,0,0.55);
padding-bottom:40px;
}

/* header */
header{
background:rgba(6,59,43,0.85);
padding:20px;
}

header h1{
margin:0;
font-size:24px;
}

/* menu container */
.menu-options{
margin-top:50px;
display:flex;
flex-direction:column;
align-items:center;
gap:18px;
}

/* tombol menu */
.menu-link{
width:200px;
padding:14px;
background-color:#e5d8b0;
border-radius:12px;
color:#063b2b;
font-weight:600;
text-decoration:none;
transition:0.3s;
}

.menu-link:hover{
background:#fff3c4;
transform:scale(1.05);
}

/* tombol kembali */
.btn-back{
display:inline-block;
margin-top:40px;
padding:10px 20px;
background:#063b2b;
color:#fff;
text-decoration:none;
border-radius:8px;
}

.btn-back:hover{
background:#0a5b40;
}

</style>
</head>

<body>

<div class="overlay">

<header>
<h1>☕ Arkaco Coffee Menu</h1>
</header>

<div class="menu-options">

<a href="signature.html" class="menu-link">🌟 Signature Coffee</a>

<a href="espresso.html" class="menu-link">☕ Espresso Base</a>

<a href="noncoffee.html" class="menu-link">🥛 Non Coffee</a>

<a href="snack.html" class="menu-link">🍟 Snack</a>

<a href="pastry.html" class="menu-link">🥐 Pastry</a>

</div>

<a href="index.html" class="btn-back">⬅️ Kembali ke Cover</a>

</div>

</body>
</html>
